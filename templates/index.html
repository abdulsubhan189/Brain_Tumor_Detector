<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>NeuroScan AI | Brain Tumor Detection</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg-gradient-start: #e0eafc;
      --bg-gradient-end: #cfdef3;
      --card-bg: rgba(255, 255, 255, 0.92);
      --card-border: rgba(255,255,255,0.4);
      --text-primary: #0a1a3a;
      --text-secondary: #4a627a;
      --input-bg: white;
      --input-border: #cdd9ff;
      --upload-bg: #f8faff;
      --upload-border: #b9c8ff;
      --pill-bg: #eef2ff;
      --error-bg: #fff0f0;
      --error-text: #d9534f;
      --btn-outline-bg: rgba(255,255,255,0.7);
      --btn-outline-border: rgba(30,42,94,0.2);
      --btn-outline-text: #1e2a5e;
      --btn-primary-bg: linear-gradient(90deg, #1e2a5e, #2c3e7a);
      --icon-color: #3b4b8a;
      --desc-bg: rgba(30,42,94,0.05);
    }
    body.dark {
      --bg-gradient-start: #0f172a;
      --bg-gradient-end: #1e293b;
      --card-bg: rgba(30, 41, 59, 0.95);
      --card-border: rgba(255,255,255,0.08);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --input-bg: #1e293b;
      --input-border: #334155;
      --upload-bg: #0f172a;
      --upload-border: #334155;
      --pill-bg: #334155;
      --error-bg: #2d1a1a;
      --error-text: #f87171;
      --btn-outline-bg: rgba(30,41,59,0.8);
      --btn-outline-border: rgba(255,255,255,0.15);
      --btn-outline-text: #cbd5e1;
      --btn-primary-bg: linear-gradient(90deg, #3b82f6, #8b5cf6);
      --icon-color: #60a5fa;
      --desc-bg: rgba(96,165,250,0.1);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(120deg, #1e2a5e, #3b4b8a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    body.dark .logo h1 {
      background: linear-gradient(120deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
    }
    .logo span {
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: block;
    }
    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .action-buttons {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .btn-outline {
      background: var(--btn-outline-bg);
      backdrop-filter: blur(4px);
      border: 1px solid var(--btn-outline-border);
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--btn-outline-text);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-outline i { margin-right: 8px; }
    .btn-outline:hover {
      background: var(--card-bg);
      border-color: var(--icon-color);
      transform: translateY(-2px);
    }
    .theme-toggle {
      background: var(--btn-outline-bg);
      backdrop-filter: blur(4px);
      border: 1px solid var(--btn-outline-border);
      border-radius: 40px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--btn-outline-text);
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 1.8rem;
      border: 1px solid var(--card-border);
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.12);
    }
    .card h3 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .upload-area {
      border: 2px dashed var(--upload-border);
      border-radius: 24px;
      padding: 2rem 1.5rem;
      text-align: center;
      background: var(--upload-bg);
      cursor: pointer;
      transition: 0.2s;
    }
    .upload-area.drag-over {
      border-color: var(--icon-color);
      background: var(--pill-bg);
    }
    .upload-icon { font-size: 3rem; color: var(--icon-color); margin-bottom: 0.5rem; }
    .file-input { display: none; }
    .url-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 60px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-primary);
      font-size: 0.9rem;
      margin: 1rem 0;
    }
    .url-input:focus { outline: none; border-color: var(--icon-color); }
    .btn-primary {
      background: var(--btn-primary-bg);
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      width: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3); }
    .preview-container { text-align: center; margin-top: 1rem; }
    .preview-img {
      max-width: 100%;
      max-height: 220px;
      border-radius: 20px;
      background: var(--upload-bg);
      padding: 8px;
      object-fit: contain;
    }
    .result-label {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      margin: 0.5rem 0;
      color: var(--text-primary);
    }
    .confidence-ring { display: flex; justify-content: center; margin: 1rem 0; }
    .circle {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--text-primary);
      background-color: var(--pill-bg);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.05), 0 8px 20px rgba(0,0,0,0.1);
    }
    .circle span {
      background: var(--card-bg);
      width: 110px;
      height: 110px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .multi-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 1rem 0;
    }
    .pill {
      background: var(--pill-bg);
      border-radius: 60px;
      padding: 0.4rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
    }
    .tumor-description {
      background: var(--desc-bg);
      border-radius: 20px;
      padding: 1rem;
      margin-top: 1rem;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-primary);
      text-align: left;
      border-left: 4px solid var(--icon-color);
    }
    .urdu-text {
      font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', 'Urdu Typesetting', serif;
      font-size: 1rem;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed rgba(128,128,128,0.3);
      direction: rtl;
      text-align: right;
    }
    .error-message {
      color: var(--error-text);
      background: var(--error-bg);
      border-radius: 60px;
      padding: 0.5rem 1rem;
      text-align: center;
      font-size: 0.85rem;
    }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 900px) {
      body { padding: 1rem; }
      .grid-2 { grid-template-columns: 1fr; }
      .header-actions { width: 100%; justify-content: space-between; }
    }
  </style>
  <!-- Load Urdu font if available (Google Fonts) -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <h1>🧠 NeuroScan AI</h1>
      <span>Brain Tumor Detection | MRI Analysis</span>
    </div>
    <div class="header-actions">
      <div class="action-buttons">
        <button class="btn-outline" id="uploadBtn"><i class="fas fa-cloud-upload-alt"></i> Upload</button>
        <button class="btn-outline" id="urlTestBtn"><i class="fas fa-link"></i> URL Test</button>
        <button class="btn-outline" id="randomTestBtn"><i class="fas fa-random"></i> Random Test</button>
        <button class="btn-outline" id="clearBtn"><i class="fas fa-broom"></i> Clear</button>
      </div>
      <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>
    </div>
  </div>
  <div class="grid-2">
    <div class="card">
      <h3><i class="fas fa-upload"></i> Upload MRI Scan</h3>
      <div class="upload-area" id="dropArea">
        <div class="upload-icon"><i class="fas fa-brain"></i></div>
        <p>Drag & drop an MRI image here or click to browse</p>
        <input type="file" id="fileInput" class="file-input" accept="image/jpeg,image/png,image/jpg,image/bmp,image/tiff" />
        <button class="btn-outline" id="browseBtn" style="margin-top: 12px;">Browse files</button>
      </div>
      <div style="margin-top: 1.2rem;">
        <input type="text" id="imageUrl" class="url-input" placeholder="Or paste image URL (direct link)" />
        <button class="btn-primary" id="predictBtn"><i class="fas fa-microscope"></i> Analyze Scan</button>
      </div>
      <div class="preview-container" id="previewContainer" style="display: none;">
        <img id="previewImg" class="preview-img" alt="Preview" />
      </div>
    </div>
    <div class="card">
      <h3><i class="fas fa-chart-line"></i> AI Diagnosis Result</h3>
      <div id="resultArea">
        <div style="text-align: center; color: var(--text-secondary); padding: 2rem 0;">
          <i class="fas fa-diagnoses" style="font-size: 3rem; opacity: 0.5;"></i>
          <p style="margin-top: 1rem;">Upload an MRI to see prediction</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Bilingual descriptions (English + Urdu)
  const tumorInfo = {
    "Glioma": {
      en: "🧬 Glioma: A tumor that arises from glial cells (supporting cells of the brain). Common symptoms include headaches, seizures, and cognitive changes. Requires further evaluation by a neurologist.",
      ur: "گلیوما: دماغ کے گلیئل خلیات میں بننے والا ٹیومر۔ علامات میں سر درد، دورے، اور ذہنی تبدیلیاں شامل ہیں۔ ماہرِ اعصاب سے رجوع کریں۔"
    },
    "Meningioma": {
      en: "🫀 Meningioma: Typically benign tumor arising from the meninges (membranes covering the brain). Often slow-growing; treatment may involve surgery or monitoring.",
      ur: "مینننگیوما: یہ عام طور پر بے ضرر ٹیومر ہوتا ہے جو دماغ کی جھلیوں سے بنتا ہے۔ آہستہ بڑھتا ہے، علاج کے لیے سرجری یا نگرانی کی جا سکتی ہے۔"
    },
    "Pituitary": {
      en: "🎯 Pituitary adenoma: Tumor of the pituitary gland. Can affect hormone levels, vision, and energy. Many are treatable with medication or surgery.",
      ur: "پٹیوٹری اڈینوما: پٹیوٹری گلینڈ کا ٹیومر۔ ہارمونز، بینائی اور توانائی متاثر ہو سکتی ہے۔ زیادہ تر ادویات یا سرجری سے قابل علاج ہیں۔"
    },
    "No Tumor": {
      en: "✅ No tumor detected. The scan appears healthy. However, always consult a radiologist for final diagnosis.",
      ur: "کوئی ٹیومر نہیں پایا گیا۔ اسکین نارمل ہے۔ تاہم، حتمی تشخیص کے لیے ریڈیولوجسٹ سے رجوع کریں۔"
    },
    "Uncertain": {
      en: "⚠️ The model is uncertain about this scan. It may be a low‑quality image or an atypical case. Please try a different MRI or consult a specialist.",
      ur: "ماڈل اس اسکین کے بارے میں یقین نہیں کر سکا۔ ممکن ہے تصویر کم معیار کی ہو یا کیس غیر معمولی ہو۔ براہِ کرم دوسرا ایم آر آئی آزمائیں یا ماہر سے ملیں۔"
    },
    "Invalid": {
      en: "❌ The uploaded image does not look like a valid brain MRI. Please provide a clear T1 or T2‑weighted MRI scan.",
      ur: "اپ لوڈ کردہ تصویر درست دماغی ایم آر آئی نہیں لگتی۔ براہِ کرم صاف T1 یا T2 MRI اسکین فراہم کریں۔"
    }
  };

  const DOM = {
    dropArea: document.getElementById('dropArea'),
    fileInput: document.getElementById('fileInput'),
    browseBtn: document.getElementById('browseBtn'),
    imageUrl: document.getElementById('imageUrl'),
    predictBtn: document.getElementById('predictBtn'),
    previewContainer: document.getElementById('previewContainer'),
    previewImg: document.getElementById('previewImg'),
    resultArea: document.getElementById('resultArea'),
    uploadBtn: document.getElementById('uploadBtn'),
    urlTestBtn: document.getElementById('urlTestBtn'),
    randomTestBtn: document.getElementById('randomTestBtn'),
    clearBtn: document.getElementById('clearBtn'),
    themeToggle: document.getElementById('themeToggle')
  };

  // Dark mode
  function initTheme() {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      document.body.classList.add('dark');
      DOM.themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
    } else {
      document.body.classList.remove('dark');
      DOM.themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
    }
  }
  function toggleTheme() {
    if (document.body.classList.contains('dark')) {
      document.body.classList.remove('dark');
      localStorage.setItem('theme', 'light');
      DOM.themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
    } else {
      document.body.classList.add('dark');
      localStorage.setItem('theme', 'dark');
      DOM.themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
    }
  }
  DOM.themeToggle.addEventListener('click', toggleTheme);
  initTheme();

  function showLoading() {
    DOM.resultArea.innerHTML = `<div style="text-align:center; padding:2rem;"><div class="loading" style="width:40px;height:40px;border-width:4px;"></div><p style="margin-top:1rem;">Analyzing MRI scan...</p></div>`;
  }

  function getBilingualDescription(label) {
    let key = null;
    if (label.includes('Glioma')) key = 'Glioma';
    else if (label.includes('Meningioma')) key = 'Meningioma';
    else if (label.includes('Pituitary')) key = 'Pituitary';
    else if (label === 'No Tumor') key = 'No Tumor';
    else if (label.includes('Uncertain')) key = 'Uncertain';
    else if (label.includes('Invalid') || label.includes('valid MRI')) key = 'Invalid';
    if (key && tumorInfo[key]) {
      return `<div>${tumorInfo[key].en}</div><div class="urdu-text">${tumorInfo[key].ur}</div>`;
    }
    return `<div>📋 Please consult a medical professional for interpretation.</div><div class="urdu-text">براہِ کرم طبی ماہر سے رجوع کریں۔</div>`;
  }

  function displayResult(data) {
    if (!data || data.label === undefined) {
      DOM.resultArea.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${data?.error || 'Invalid response'}</div>`;
      return;
    }
    const label = data.label || 'Unknown';
    const confidence = data.confidence || 0;
    const allPredictions = data.all_predictions || [];
    let multiHtml = '';
    if (allPredictions.length) {
      multiHtml = `<hr style="opacity:0.2;"><div style="font-size:0.9rem; font-weight:500; margin-bottom:10px;">Class probabilities / درجہ بندی کے امکانات:</div>
        <div class="multi-pills">${allPredictions.map(p => `<div class="pill"><strong>${p.label}</strong> ${p.confidence}%</div>`).join('')}</div>`;
    } else if (label === 'No Tumor') {
      multiHtml = `<div class="pill" style="margin:1rem auto;">✅ Healthy brain tissue – no tumor detected</div>`;
    }
    const angle = (confidence / 100) * 360;
    const circleStyle = `conic-gradient(#3b82f6 0deg ${angle}deg, #e2e8f0 ${angle}deg 360deg)`;
    const descriptionHtml = getBilingualDescription(label);
    DOM.resultArea.innerHTML = `
      <div class="result-label">${label}</div>
      <div class="confidence-ring"><div class="circle" style="background: ${circleStyle};"><span>${confidence}%</span></div></div>
      <div style="text-align:center; font-size:0.8rem; color:var(--text-secondary);">Confidence score / اعتماد کی سطح</div>
      ${multiHtml}
      <div class="tumor-description">${descriptionHtml}</div>
      ${data.error ? `<div class="error-message" style="margin-top:1rem;">⚠️ ${data.error}</div>` : ''}
    `;
  }

  async function sendPrediction(formData) {
    showLoading();
    try {
      const resp = await fetch('/predict', { method: 'POST', body: formData });
      const data = await resp.json();
      displayResult(data);
    } catch (err) {
      DOM.resultArea.innerHTML = `<div class="error-message">Network error: ${err.message}</div>`;
    }
  }

  function predictFromFile(file) {
    if (!file) return;
    DOM.previewImg.src = URL.createObjectURL(file);
    DOM.previewContainer.style.display = 'block';
    const fd = new FormData();
    fd.append('file', file);
    sendPrediction(fd);
  }
  function predictFromUrl(url) {
    if (!url.trim()) return alert('Enter URL');
    DOM.previewImg.src = url;
    DOM.previewContainer.style.display = 'block';
    const fd = new FormData();
    fd.append('url', url);
    sendPrediction(fd);
  }
  function randomTest() {
    const samples = [
      'https://upload.wikimedia.org/wikipedia/commons/8/8a/Brain_MRI.jpg',
      'https://upload.wikimedia.org/wikipedia/commons/5/59/MRI_head_side.jpg',
      'https://upload.wikimedia.org/wikipedia/commons/3/3c/Brain_MRI_2.jpg'
    ];
    const url = samples[Math.floor(Math.random() * samples.length)];
    DOM.imageUrl.value = url;
    predictFromUrl(url);
  }
  function clearAll() {
    DOM.fileInput.value = '';
    DOM.imageUrl.value = '';
    DOM.previewContainer.style.display = 'none';
    DOM.previewImg.src = '';
    DOM.resultArea.innerHTML = `<div style="text-align:center; color:var(--text-secondary); padding:2rem 0;"><i class="fas fa-diagnoses" style="font-size:3rem; opacity:0.5;"></i><p style="margin-top:1rem;">Upload an MRI to see prediction</p></div>`;
  }

  DOM.browseBtn.addEventListener('click', () => DOM.fileInput.click());
  DOM.uploadBtn.addEventListener('click', () => DOM.fileInput.click());
  DOM.fileInput.addEventListener('change', e => e.target.files.length && predictFromFile(e.target.files[0]));
  DOM.predictBtn.addEventListener('click', () => {
    if (DOM.imageUrl.value.trim()) predictFromUrl(DOM.imageUrl.value.trim());
    else if (DOM.fileInput.files.length) predictFromFile(DOM.fileInput.files[0]);
    else alert('Select an image or enter URL');
  });
  DOM.urlTestBtn.addEventListener('click', () => DOM.imageUrl.focus());
  DOM.randomTestBtn.addEventListener('click', randomTest);
  DOM.clearBtn.addEventListener('click', clearAll);

  // Drag & drop
  ['dragenter','dragover','dragleave','drop'].forEach(ev => DOM.dropArea.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); }));
  ['dragenter','dragover'].forEach(ev => DOM.dropArea.addEventListener(ev, () => DOM.dropArea.classList.add('drag-over')));
  ['dragleave','drop'].forEach(ev => DOM.dropArea.addEventListener(ev, () => DOM.dropArea.classList.remove('drag-over')));
  DOM.dropArea.addEventListener('drop', e => {
    const files = e.dataTransfer.files;
    if (files.length) {
      DOM.fileInput.files = files;
      predictFromFile(files[0]);
    }
  });
  DOM.imageUrl.addEventListener('blur', () => {
    if (DOM.imageUrl.value.trim()) {
      DOM.previewImg.src = DOM.imageUrl.value.trim();
      DOM.previewContainer.style.display = 'block';
    }
  });
</script>
</body>
</html>
